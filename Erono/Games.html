<!DOCTYPE html>
<html>
<head>
  <title>Games</title>

  <style>
    body {
      margin: 0;
      background-color: green;
      font-family: Arial, sans-serif;
    }

    /* Home Button */
    .myBtn {
      padding: 10px 20px;
      background-color: blue;
      color: white;
      border: 3px solid white;
      border-radius: 13px;
      font-size: 18px;
      cursor: pointer;
    }

    .myBtn:hover {
      background-color: royalblue;
    }

    /* Title */
    .title {
      text-align: center;
      font-size: 80pt;
      background-color: grey;
      font-weight: bold;
      margin: 0;
      padding: 20px;
    }

    /* Game links */
    .link {
      font-size: 40pt;
      text-align: center;
      background-color: blue;
      padding: 20px;
      margin-top: 20px;
    }

    .link a {
      color: black;
      text-decoration: none;
      cursor: pointer;
    }

    .link a:hover {
      text-decoration: underline;
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 30pt;
      background-color: blue;
      color: white;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- Home Button -->
  <a href="index.html" class="myBtn">⬅️ Home</a>

  <p class="title">Games</p>
  <p style="text-align:center">Click one of the titles below to play a game.</p>

  <div class="link">
    <a href="https://scratch.mit.edu/projects/1169168548/" target="_blank">
      the football game
    </a>
  </div>

  <div class="link">
    <a href="https://scratch.mit.edu/projects/1137932607/" target="_blank">
      pc simulator
    </a>
  </div>

  <div class="link">
    <a href="https://scratch.mit.edu/projects/1183316592/" target="_blank">
      snake I
    </a>
  </div>

  <footer class="footer">
    © 2026 Games Page
  </footer>

</body>
</html>
