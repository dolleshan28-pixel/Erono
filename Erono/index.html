<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      background-color: green;
      font-family: Arial, sans-serif;
    }

    /* Logo */
    .logo-container {
      width: 100%;
      text-align: center;
      background-color: aqua;
      padding: 20px 0;
    }

    .logo-container img {
      width: 80%;
      max-width: 600px;
      height: auto;
    }

    /* Navigation */
    .nav-links {
      background-color: brown;
      text-align: center;
      padding: 10px 0;
    }

    .nav-links a {
      color: white;
      font-weight: bold;
      font-size: 14pt;
      margin: 0 15px;
      text-decoration: none;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    /* Section titles */
    .section-title {
      text-align: left;
      font-size: 40pt;
      font-weight: bold;

      text-align: left;
      padding: 10px;

    }

    .item {
      text-align: center;
      font-size: 30pt;
      margin: 20px 0;
    }

    .center {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .myBtn {
      padding: 12px 25px;
      background-color: grey;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    .myBtn:hover {
      background-color: darkgrey;
    }

    /* Footer */
    .footer {
      text-align: left;
      margin-top: 50px;
      font-size: 14pt;
      line-height: 1.5;
      background-color: white;
      padding: 15px;
    }
  </style>
</head>

<body>

  <!-- Logo -->
